name: "Ferry Setup"
description: "Parse Ferry dispatch payload and output matrix for fan-out"

inputs:
  payload:
    description: "Raw dispatch payload JSON string"
    required: true

outputs:
  has_lambdas:
    description: "Whether the payload contains Lambda resources ('true'/'false')"
    value: ${{ steps.parse.outputs.has_lambdas }}
  has_step_functions:
    description: "Whether the payload contains Step Function resources ('true'/'false')"
    value: ${{ steps.parse.outputs.has_step_functions }}
  has_api_gateways:
    description: "Whether the payload contains API Gateway resources ('true'/'false')"
    value: ${{ steps.parse.outputs.has_api_gateways }}
  lambda_matrix:
    description: "JSON matrix for Lambda deploy job (fromJson-compatible)"
    value: ${{ steps.parse.outputs.lambda_matrix }}
  sf_matrix:
    description: "JSON matrix for Step Function deploy job (fromJson-compatible)"
    value: ${{ steps.parse.outputs.sf_matrix }}
  ag_matrix:
    description: "JSON matrix for API Gateway deploy job (fromJson-compatible)"
    value: ${{ steps.parse.outputs.ag_matrix }}
  resource_types:
    description: "Comma-separated list of affected resource types"
    value: ${{ steps.parse.outputs.resource_types }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install ferry-action package
      shell: bash
      run: uv pip install --quiet --system "${{ github.action_path }}/.."

    - name: Parse dispatch payload
      id: parse
      shell: bash
      env:
        INPUT_PAYLOAD: ${{ inputs.payload }}
      run: python -m ferry_action.parse_payload
