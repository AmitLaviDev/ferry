name: "Ferry Deploy"
description: "Deploy Lambda function from ECR image"

inputs:
  resource-name:
    description: "Name of the Lambda resource"
    required: true
  function-name:
    description: "Lambda function name in AWS"
    required: true
  image-uri:
    description: "Full ECR image URI with tag"
    required: true
  image-digest:
    description: "Image digest (sha256) for skip detection"
    required: true
  deployment-tag:
    description: "Deployment tag (e.g. pr-42)"
    required: true
  trigger-sha:
    description: "Git commit SHA that triggered the deployment"
    required: false
    default: ""
  aws-role-arn:
    description: "IAM role ARN for OIDC authentication"
    required: true
  aws-region:
    description: "AWS region"
    required: false
    default: "us-east-1"
  github-token:
    description: "GitHub token for creating Check Runs. Pass ${{ github.token }}"
    required: false
    default: ""

outputs:
  skipped:
    description: "Whether deploy was skipped (image unchanged)"
    value: ${{ steps.deploy.outputs.skipped }}
  lambda-version:
    description: "Published Lambda version number"
    value: ${{ steps.deploy.outputs.lambda-version }}

runs:
  using: composite
  steps:
    - name: Configure AWS credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws-role-arn }}
        aws-region: ${{ inputs.aws-region }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install ferry-action package
      shell: bash
      run: uv pip install --system "${{ github.action_path }}/.."

    - name: Deploy Lambda function
      id: deploy
      shell: bash
      env:
        INPUT_RESOURCE_NAME: ${{ inputs.resource-name }}
        INPUT_FUNCTION_NAME: ${{ inputs.function-name }}
        INPUT_IMAGE_URI: ${{ inputs.image-uri }}
        INPUT_IMAGE_DIGEST: ${{ inputs.image-digest }}
        INPUT_DEPLOYMENT_TAG: ${{ inputs.deployment-tag }}
        INPUT_TRIGGER_SHA: ${{ inputs.trigger-sha }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: python -m ferry_action.deploy
